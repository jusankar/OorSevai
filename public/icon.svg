<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Define clipping path to keep everything within a clean circular emblem -->
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="210" />
    </clipPath>
  </defs>

  <!-- Clear white circular background for high visibility across themes -->
  <circle cx="256" cy="256" r="210" fill="#FFFFFF" />

  <!-- Group clipped to the circle -->
  <g clip-path="url(#circleClip)">
    <!-- GEAR (Upper half) -->
    <!-- Inner gear rim stroke -->
    <circle cx="256" cy="256" r="176" fill="none" stroke="#043912" stroke-width="25" />
    
    <!-- Gear teeth rotated around center -->
    <rect x="242" y="44" width="28" height="38" rx="5" fill="#043912" transform="rotate(-90 256 256)" />
    <rect x="242" y="44" width="28" height="38" rx="5" fill="#043912" transform="rotate(-72 256 256)" />
    <rect x="242" y="44" width="28" height="38" rx="5" fill="#043912" transform="rotate(-54 256 256)" />
    <rect x="242" y="44" width="28" height="38" rx="5" fill="#043912" transform="rotate(-36 256 256)" />
    <rect x="242" y="44" width="28" height="38" rx="5" fill="#043912" transform="rotate(-18 256 256)" />
    <rect x="242" y="44" width="28" height="38" rx="5" fill="#043912" transform="rotate(0 256 256)" />
    <rect x="242" y="44" width="28" height="38" rx="5" fill="#043912" transform="rotate(18 256 256)" />
    <rect x="242" y="44" width="28" height="38" rx="5" fill="#043912" transform="rotate(36 256 256)" />
    <rect x="242" y="44" width="28" height="38" rx="5" fill="#043912" transform="rotate(54 256 256)" />
    <rect x="242" y="44" width="28" height="38" rx="5" fill="#043912" transform="rotate(72 256 256)" />
    <rect x="242" y="44" width="28" height="38" rx="5" fill="#043912" transform="rotate(90 256 256)" />

    <!-- Seedling Center Head / Circle -->
    <circle cx="256" cy="154" r="17" fill="#043912" />

    <!-- Right upper element: Circle/Sun and curved swooping dynamic arm -->
    <circle cx="356" cy="98" r="21" fill="#58A72B" />
    <path d="M 331 112 C 311 132 291 152 281 157" stroke="#58A72B" stroke-width="12" stroke-linecap="round" fill="none" />

    <!-- SPROUT / LEAVES (Center) -->
    <!-- Left Leaf -->
    <path d="M 256 246 C 218 226 192 181 192 146 C 192 131 212 121 232 146 C 248 166 255 198 256 226 Z" fill="#2E691A" />
    <!-- Right Leaf -->
    <path d="M 256 226 C 275 204 310 178 310 151 C 310 136 294 131 278 151 C 263 168 258 196 256 211 Z" fill="#58A72B" />

    <!-- AGRICULTURAL FIELDS (Bottom Layered Hills) -->
    <!-- Layer 1: Dark green base landscape background -->
    <path d="M 40 236 Q 256 216 472 236 L 472 486 L 40 486 Z" fill="#1C4B0F" />

    <!-- Layer 2: Medium green hill sweep -->
    <path d="M 40 236 Q 256 216 472 236 Q 280 276 170 486 L 40 486 Z" fill="#2D7A1D" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />

    <!-- Layer 3: Vibrant green hill sweep -->
    <path d="M 40 276 Q 210 346 472 271 L 472 486 L 40 486 Z" fill="#4B9A25" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />

    <!-- Layer 4: Light green front-most hill sweep -->
    <path d="M 120 486 Q 290 316 472 351 L 472 486 Z" fill="#6CB737" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
  </g>

  <!-- Clean outer border for logo sharpness -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#E2E8F0" stroke-width="2" />
</svg>
